name: Daily Macro Update

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Fetch Latest Macro Data
        run: npm run fetch-data
        env:
          VITE_FRED_API_KEY: ${{ secrets.VITE_FRED_API_KEY }}

      - name: Commit Updated Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/macroData.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily data update: $(date +'%Y-%m-%d')" && git push)

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
